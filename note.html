<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 모바일 뷰포트 최적화 메타 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포인트 관리 대시보드</title>
  <style>
    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --primary-active: #3730a3; /* 모바일 터치 피드백용 */
      --danger-color: #ef4444;
      --background-color: #f3f4f6;
      --card-background: #ffffff;
      --text-color: #1f2937;
      --text-secondary: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      /* 모바일 터치 시 생기는 파란색 하이라이트 박스 제거 */
      -webkit-tap-highlight-color: transparent; 
    }

    body {
      background-color: var(--background-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px; /* 모바일 여백 최소화 */
    }

    /* 카드 컨테이너 - 모바일 대응 */
    .app-container {
      background: var(--card-background);
      border-radius: 20px; /* 더 부드러운 모바일 감성 코너링 */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 420px;
      padding: 24px 20px; /* 양옆 여백 모바일 조절 */
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--text-color);
    }

    /* 포인트 잔액 카드 */
    .point-card {
      background: linear-gradient(135deg, var(--primary-color), #818cf8);
      color: white;
      border-radius: 14px;
      padding: 22px 16px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.15);
    }

    .point-card p {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .point-card .balance {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* 경고 문구 - 모바일 가독성 증대 */
    .fee-notice {
      background-color: #fef2f2;
      border: 1px solid #fee2e2;
      color: var(--danger-color);
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 500;
    }

    /* 입력 폼 */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    /* 모바일 인풋창 크기 키움 (최소 높이 확보) */
    .input-wrapper input {
      width: 100%;
      height: 52px;
      padding: 0 40px 0 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px; /* iOS Safari에서 포커스 시 화면 확대 자동 방지 (16px 이상 권장) */
      outline: none;
      transition: all 0.2s ease;
      background-color: #f9fafb;
    }

    .input-wrapper input:focus {
      border-color: var(--primary-color);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
    }

    .input-wrapper .unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
    }

    /* 버튼 그룹 - 가로배치 유지하되 터치하기 편하게 높이 조절 */
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    button {
      height: 52px; /* 모바일 터치 표준 가이드라인 반영 */
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-charge {
      background-color: #e0e7ff;
      color: var(--primary-color);
    }

    .btn-charge:hover {
      background-color: #c7d2fe;
    }

    .btn-charge:active {
      background-color: #b4c6fc; /* 모바일 터치다운 피드백 */
    }

    .btn-use {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-use:hover {
      background-color: var(--primary-hover);
    }

    .btn-use:active {
      background-color: var(--primary-active); /* 모바일 터치다운 피드백 */
    }

    /* 내역 리스트 */
    .history-section h3 {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 8px;
    }

    .history-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      /* 모바일 부드러운 스크롤 */
      -webkit-overflow-scrolling: touch; 
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      font-size: 13px;
      border-bottom: 1px dashed #f3f4f6;
    }

    .history-item .details {
      display: flex;
      flex-direction: column;
    }

    .history-item .type {
      font-weight: 700;
    }

    .history-item .date {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .history-item .amount {
      font-weight: 700;
      font-size: 14px;
    }

    .history-item.plus .amount {
      color: #10b981;
    }

    .history-item.minus .amount {
      color: var(--danger-color);
    }

    .no-history {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 30px 0;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>MY POINT</h1>
    </header>

    <!-- 포인트 확인 영역 -->
    <div class="point-card">
      <p>사용 가능한 포인트</p>
      <div class="balance" id="pointDisplay">10,000 P</div>
    </div>

    <!-- 수수료 안내 뱃지 -->
    <div class="fee-notice">
      ⚠️ 포인트 사용 시 건당 <strong>500원(P)의 수수료</strong>가 추가 차감됩니다.
    </div>

    <!-- 입력 제어 영역 (모바일 전용 숫자 키패드 유도 속성 추가) -->
    <div class="form-group">
      <label for="pointInput">포인트 입력</label>
      <div class="input-wrapper">
        <input type="number" id="pointInput" placeholder="금액을 입력하세요" min="1" inputmode="numeric" pattern="[0-9]*">
        <span class="unit">P</span>
      </div>
    </div>

    <!-- 버튼 트리거 -->
    <div class="button-group">
      <button class="btn-charge" onclick="chargePoints()">충전</button>
      <button class="btn-use" onclick="usePoints()">사용</button>
    </div>

    <!-- 포인트 내역 -->
    <div class="history-section">
      <h3>최근 이용 내역</h3>
      <ul class="history-list" id="historyList">
        <li class="no-history">이용 내역이 없습니다.</li>
      </ul>
    </div>
  </div>

  <script>
    let currentPoints = 10000;
    const FEE = 500;

    const pointDisplay = document.getElementById('pointDisplay');
    const pointInput = document.getElementById('pointInput');
    const historyList = document.getElementById('historyList');

    function updateDisplay() {
      pointDisplay.textContent = currentPoints.toLocaleString() + ' P';
    }

    function getFormattedDate() {
      const now = new Date();
      return `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    function addHistory(type, amount, isPlus, hasFee = false) {
      const emptyMsg = historyList.querySelector('.no-history');
      if (emptyMsg) {
        emptyMsg.remove();
      }

      const li = document.createElement('li');
      li.className = `history-item ${isPlus ? 'plus' : 'minus'}`;
      
      let feeText = hasFee ? ` (수수료 ${FEE}P)` : '';
      let sign = isPlus ? '+' : '-';

      li.innerHTML = `
        <div class="details">
          <span class="type">${type}</span>
          <span class="date">${getFormattedDate()}</span>
        </div>
        <span class="amount">${sign}${amount.toLocaleString()} P${feeText}</span>
      `;

      historyList.insertBefore(li, historyList.firstChild);
    }

    function chargePoints() {
      const amount = parseInt(pointInput.value);
      
      if (isNaN(amount) || amount <= 0) {
        alert('올바른 충전 금액을 입력해주세요.');
        return;
      }

      currentPoints += amount;
      updateDisplay();
      addHistory('충전 완료', amount, true);
      
      pointInput.value = '';
      pointInput.blur(); // 키패드 내리기
    }

    function usePoints() {
      const amount = parseInt(pointInput.value);
      
      if (isNaN(amount) || amount <= 0) {
        alert('올바른 사용 금액을 입력해주세요.');
        return;
      }

      const totalDeduction = amount + FEE;

      if (currentPoints < totalDeduction) {
        alert(`포인트가 부족합니다!\n\n사용 요청: ${amount.toLocaleString()} P\n수수료: ${FEE.toLocaleString()} P\n필요한 총 포인트: ${totalDeduction.toLocaleString()} P\n현재 잔액: ${currentPoints.toLocaleString()} P`);
        return;
      }

      currentPoints -= totalDeduction;
      updateDisplay();
      
      addHistory('포인트 사용', totalDeduction, false, true);
      
      alert(`성공적으로 사용되었습니다!\n${amount.toLocaleString()} P가 사용되었고, 추가 수수료 ${FEE} P를 포함해 총 ${totalDeduction.toLocaleString()} P가 차감되었습니다.`);
      pointInput.value = '';
      pointInput.blur(); // 키패드 내리기
    }

    updateDisplay();
  </script>
</body>
</html>
